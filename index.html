<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Puppy 🐶</title>


<!-- 小狗打开 ZIP 的工具 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>


<link rel="stylesheet" href="style.css">


</head>



<body>


<div class="app">


<div class="puppy">

🐶✨

</div>



<h1>
Memory Puppy
</h1>


<p class="subtitle">

把聊天记录<br>
变成属于你的珍贵记忆

</p>




<div class="card">


<h2>
📦 投喂聊天包
</h2>


<p>
选择 ChatGPT 导出的 ZIP 文件
</p>



<label class="upload">


🐾 选择 ZIP 文件


<input 
id="zipInput"
type="file"
accept=".zip"
>


</label>



<div id="fileName">

还没有选择文件

</div>




<button id="startBtn">

开始整理 🐶

</button>




<div id="result">


等待小狗收到聊天包...

</div>



</div>




<div class="tip">

汪！小狗会帮你读取聊天记录 ✨

</div>




</div>



<script src="script.js"></script>



</body>

</html>
