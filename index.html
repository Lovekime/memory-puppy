<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>Memory Puppy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>


<body>


<div class="app">


<div class="puppy">

🐶

</div>


<h1>
Memory Puppy
</h1>


<p class="subtitle">
把聊天记录变成属于你的记忆 ✨
</p>



<div class="card">


<h2>
📦 上传聊天包
</h2>


<p>
选择 ChatGPT 导出的 ZIP 文件
</p>


<label class="upload">

选择 ZIP 🐾

<input 
id="zipInput"
type="file"
accept=".zip"
>

</label>



<div id="fileName">

还没有选择文件

</div>



<button id="startBtn">
开始整理 🐾
</button>


</div>



<div class="status"
id="status">

🐶 小狗正在等待主人...

</div>



</div>



<script src="script.js"></script>

</body>

</html>
