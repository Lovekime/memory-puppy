<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Puppy 🐶</title>


<!-- ZIP解析 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>


<link rel="stylesheet" href="style.css">


</head>


<body>


<div class="container">


    <div class="puppy">

        <div class="face">
            🐶
        </div>

        <h1>
            Memory Puppy
        </h1>

        <p>
            把聊天记录变成你的长期记忆 ✨
        </p>

    </div>




    <div class="card">


        <h2>
            📦 投喂聊天包
        </h2>


        <label class="upload">


            🐾 选择 ZIP 文件


            <input
            id="zipInput"
            type="file"
            accept=".zip"
            >


        </label>



        <div id="fileName">

            还没有选择文件

        </div>




        <button id="startBtn">

            开始整理 🐾

        </button>



    </div>





    <div class="card result-card">


        <h2>
            🐶 小狗状态
        </h2>


        <div id="result">

            等待你的聊天包...

        </div>


    </div>




    <div class="memory-card">


        <h2>
            🧠 Memory Puppy
        </h2>


        <div class="memory-item">

            ❤️ 兴趣

            <br>

            等待发现...

        </div>



        <div class="memory-item">

            📌 当前项目

            <br>

            等待发现...

        </div>




        <div class="memory-item">

            🌱 最近变化

            <br>

            等待发现...

        </div>


    </div>



</div>



<script src="script.js"></script>


</body>


</html>
